<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Vesta — a native macOS terminal on libghostty</title>
<meta name="description" content="A native macOS terminal emulator built on libghostty. GPU-rendered, scriptable by agents, with a git-worktree session per task.">
<link rel="icon" href="assets/vesta-icon.png">
<link rel="apple-touch-icon" href="assets/vesta-icon.png">
<link rel="stylesheet" href="css/style.css">
</head>
<body class="home">
  <main class="hero">
    <img id="mark" class="mark" src="assets/icon/0-white.png" width="128" height="128" alt="Vesta">
    <h1 class="wordmark" aria-label="Vesta"><span>V</span><span>e</span><span>s</span><span>t</span><span>a</span></h1>
    <p class="lede">A native&nbsp;macOS terminal on <a href="https://ghostty.org">libghostty</a> —
      GPU-rendered, scriptable by agents, a git&#8209;worktree session per task.</p>
    <nav class="actions">
      <a class="btn" href="https://github.com/vestaterm/Vesta/releases/latest">Install</a>
      <a class="btn" href="docs.html">Documentation</a>
    </nav>
  </main>
  <footer class="foot">
    <span>Alpha · macOS only · built on libghostty</span>
    <a href="https://github.com/vestaterm/Vesta">GitHub ↗</a>
  </footer>
  <script>
    // landing: the mark de-corrupts (pixelated pink → clean white) while the wordmark
    // letters spin through Redaction grades and settle left-to-right (slot-machine feel)
    (function () {
      var mark = document.getElementById("mark");
      // Frames most-corrupt → clean: the 40 anim-NN stages (exported from the
      // AppIcon-anim/Vesta-anim-NN.icon docs, coarsest = 40), then pink, then clean white.
      // We keep only the ones that actually load, so the cycle self-heals if any is missing.
      var pad = function (n) { return n < 10 ? "0" + n : "" + n; };
      var candidates = [];
      for (var i = 40; i >= 1; i--) candidates.push("assets/icon/anim-" + pad(i) + ".png");
      candidates.push("assets/icon/1-pink.png", "assets/icon/0-white.png");
      var clean = "assets/icon/0-white.png";

      var gradeNums = [10, 20, 35, 50, 70, 100];
      var grades = gradeNums.map(function (n) { return "Redaction " + n; });
      var letters = document.querySelectorAll(".wordmark span");
      function fam(g) { return '"' + g + '", Georgia, serif'; }
      function corruptColor(n) {   // grade 10 ≈ white, grade 100 = full pink
        var t = (n - 10) / 90;
        return "rgb(255," + Math.round(255 - t * 194) + "," + Math.round(255 - t * 133) + ")";
      }

      var totalMs = 850 + letters.length * 200;
      var markMs = totalMs;   // mark resolves in lockstep with the wordmark settling
      function run(frames) {
        if (matchMedia("(prefers-reduced-motion: reduce)").matches) { if (mark) mark.src = clean; return; }
        if (mark && frames.length) mark.src = frames[0];
        var locked = [], step = 0;
        var tick = setInterval(function () {
          step++;
          letters.forEach(function (el, i) {
            if (locked[i]) return;
            var idx = (step + i) % grades.length;
            el.style.fontFamily = fam(grades[idx]);
            el.style.color = corruptColor(gradeNums[idx]);
          });
        }, 90);
        // mark: one-way resolve, stepping straight from most-corrupt to clean.
        var last = frames.length - 1, g = 0;
        var gtick = setInterval(function () {
          g++;
          if (mark) mark.src = frames[Math.min(last, g)];
          if (g >= last) clearInterval(gtick);
        }, markMs / (last + 1));
        letters.forEach(function (el, i) {
          setTimeout(function () { locked[i] = true; el.style.fontFamily = ""; el.style.color = ""; }, 850 + i * 200);
        });
        setTimeout(function () { clearInterval(tick); }, totalMs);
        setTimeout(function () { clearInterval(gtick); if (mark) mark.src = clean; }, markMs);
      }

      // preload candidates; keep (in order) only those that load, then start once fonts are ready
      var loaded = {}, pending = candidates.length;
      function ready() {
        var frames = candidates.filter(function (s) { return loaded[s]; });
        var go = function () { run(frames); };
        if (document.fonts && document.fonts.load) {
          Promise.all(grades.map(function (g) { return document.fonts.load('120px ' + JSON.stringify(g)); })).then(go, go);
        } else { go(); }
      }
      candidates.forEach(function (src) {
        var im = new Image();
        im.onload = function () { loaded[src] = true; if (--pending === 0) ready(); };
        im.onerror = function () { if (--pending === 0) ready(); };
        im.src = src;
      });
    })();
  </script>
</body>
</html>
